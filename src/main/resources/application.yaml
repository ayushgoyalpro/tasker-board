spring:
  application:
    name: tasker
  datasource:
    url: jdbc:sqlite:${TASKER_DB_PATH:./tasker.db}
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    open-in-view: false
  ai:
    mcp:
      server:
        name: tasker
        description: Personal task board — manage projects and tickets
        type: SYNC

logging:
  level:
    org.hibernate: ERROR
